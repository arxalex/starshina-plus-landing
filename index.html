<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Старшина+ — Система управління військовим майном</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAV -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="#" class="brand">
        <span class="brand-name">Старшина<span class="brand-accent">+</span></span>
      </a>
      <div class="nav-links">
        <a href="#features">Можливості</a>
        <a href="#about">Про застосунок</a>
        <a href="https://send.monobank.ua/jar/SGNACqxLA" class="btn-donate">❤️ Підтримати</a>
      </div>
      <button class="nav-toggle" id="navToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- JS to handle toggle -->
  <script>
    document.getElementById('navToggle').addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
      this.classList.toggle('active');
    });
  </script>
</body>
</html>
